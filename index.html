<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Character Counter</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <main>

        <section class="card">

            <div class="top-bar">

                <div class="logo">
                    <img 
                        src="./assets/images/logo.svg" alt="Character Counter Logo">

                    <span>Character Counter</span>
                </div>

                <button class="menu-btn">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

            </div>

            <h1>
                Analyze your text in real-time.
            </h1>

            <textarea placeholder="Start typing here..."></textarea>

            <div class="controls-row">

            <div class="controls-left">
                <label class="checkbox-label">
            <input type="checkbox" id="excludeSpaces">
            <span class="custom-checkbox"></span>
            Exclude Spaces</label>

            <label class="checkbox-label">
            <input type="checkbox" id="setCharLimit">
            <span class="custom-checkbox"></span>
            Set Character Limit
        </label>

        <input 
            type="number" 
            id="charLimitInput" 
            class="char-limit-input hidden" 
            placeholder="e.g. 100" 
            min="1">

            </div>

    <div class="controls-right">
        <span class="reading-time">Approx. reading time: &lt;1 minute</span>
    </div>

</div>



        </section>

    </main>

</body>

</html>
